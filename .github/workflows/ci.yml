name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Pinned to match rust-toolchain.toml so a floating-stable bump can't
      # break CI via newly-promoted clippy lints.
      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      # OpenCV is required by rvo-buffer and rvo-camera.
      # libopencv-dev pulls the C++ headers; clang/libclang-dev is needed by
      # the opencv-rust bindgen step.
      - name: Install OpenCV system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev \
            clang \
            libclang-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo check examples
        run: cargo check -p rvo-bin --examples

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt
        run: cargo fmt --all -- --check

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
      - name: cargo-audit (RustSec advisory scan)
        run: |
          cargo install cargo-audit
          cargo audit

  sdk-validation:
    name: SDK Validation and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'

      - name: Install Go Protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Python Protoc plugins
        run: pip install grpcio-tools

      - name: Generate SDKs
        run: ./scripts/generate_sdks.sh

      - name: Check for SDK drift
        run: |
          git status --porcelain
          if [[ -n $(git status --porcelain) ]]; then
            echo "Error: Generated SDKs are out of sync with detector.proto. Please run scripts/generate_sdks.sh and commit the changes."
            exit 1
          fi

      - name: Test SDKs
        run: ./sdk/test_sdks.sh
