# Demo config: RVO reads a camera and fans frames out to two external gRPC
# model services (see demo/services/model_service.py). Run via demo/run_demo.sh.
camera:
  device_index: 0
  # source_uri: "rtsp://user:pass@192.168.1.100:554/stream"

clips_dir: clips/demo
event_log: events.jsonl

detectors:
  - kind: remote_grpc
    endpoint: "http://localhost:50051"
    output_signal: PersonDetected
    max_fps: 15
    timeout_ms: 200
    ttl_ms: 1000

  - kind: remote_grpc
    endpoint: "http://localhost:50052"
    output_signal: FacePresent
    max_fps: 15
    timeout_ms: 200
    ttl_ms: 1000

# Note: EventType is currently "DummyEvent" for all events; the signal_type is
# what differs. The event fires after `duration_ms` of sustained signal.
events:
  - event_type: DummyEvent
    signal_type: PersonDetected
    signal_threshold: 1
    duration_ms: 1000
    cooldown_ms: 5000

  - event_type: DummyEvent
    signal_type: FacePresent
    signal_threshold: 1
    duration_ms: 1000
    cooldown_ms: 5000
